# Strategy and pipeline parameters. No secrets here — secrets live in .env.

universe:
  tickers: ["AAPL", "MSFT", "NVDA", "SPY"]

data:
  provider: yfinance          # yfinance | alpaca (Phase 2)
  store_path: data/bars       # parquet, gitignored
  start: "2018-01-01"

strategy:
  name: sma_crossover
  params:
    fast: 20
    slow: 50

backtest:
  cost_bps: 5                 # per-side transaction cost, basis points
  slippage_bps: 2

execution:
  broker: simulated            # simulated | alpaca_paper (Alpaca unavailable to Canadians)
  ledger_path: data/ledger.sqlite
  sim_db_path: data/sim_broker.sqlite
  starting_cash: 100000        # simulated paper account starting balance

sentiment:                     # Phase 2c: FinBERT gate over the base signal
  enabled: true                # keyless via yfinance news; degrades to ungated on failure
  lookback_hours: 48
  half_life_hours: 24          # a headline's vote halves every 24h
  gate_threshold: 0.2          # veto long entry below -0.2, short entry above +0.2
  sources:                     # yfinance publisher whitelist (case-insensitive)
    ["reuters", "bloomberg", "barron's", "marketwatch", "cnbc",
     "yahoo finance", "thestreet", "benzinga", "investor's business daily"]

risk:                          # enforced in Phase 2 live pipeline; documented now
  max_daily_drawdown_pct: 3.0
  max_position_pct: 20.0
